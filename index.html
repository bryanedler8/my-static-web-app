<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Azure Static Web App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        p { font-size: 1.2em; line-height: 1.6; }
        .badge {
            background: #00d4ff;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> The title has been changed!</h1>
        <!-- <h1> Welcome to My Static Web App!</h1> -->
        <p>This website is deployed on <strong>Azure Static Web Apps</strong> with automatic CI/CD from GitHub.</p>
        <p>Made using HTML, CSS, and Azure</p>
        <div class="badge">Updated: Version 2.0 - Auto-deployed via CI/CD!</div>

        <p>This change was automatically deployed using GitHub Actions!</p>
    </div>
</body>
</html>
